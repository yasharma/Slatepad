name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Slatepad ${{ github.ref_name }}
          releaseBody: |
            macOS installers (Apple Silicon and Intel).

            **Homebrew:** after assets are uploaded, update checksums in [homebrew-tap](https://github.com/yasharma/homebrew-tap):

            ```bash
            git clone https://github.com/yasharma/homebrew-tap.git
            cd homebrew-tap
            ./scripts/update-cask-sha.sh ${{ github.ref_name }}
            # Edit Casks/slatepad.rb with printed sha256 values, bump version if needed, commit, push
            ```
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
